services:
  redis:
    image: redis:7-alpine
    container_name: bullmq-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Usamos a variável de ambiente do arquivo .env aqui
    command: redis-server --save 60 1 --loglevel warning --requirepass ${DATABASE_PASSWORD_API}

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU NVIDIA (descomente se tiver GPU + nvidia-container-toolkit instalado)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Servidor de mídia do Portal de Câmeras (CFTV). O backend (no host) orquestra
  # via http://localhost:9997 e o MediaMTX chama o backend via host.docker.internal:3000.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "8889:8889" # WebRTC / WHEP (HTTP — proxiado pelo nginx em /stream)
      - "8189:8189/udp" # WebRTC ICE (mídia do vídeo — abrir UDP no firewall)
      - "9996:9996" # Playback de gravações (proxiado em /stream/playback)
      - "9997:9997" # API (manter interna; não expor publicamente)
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - mediamtx_recordings:/recordings
    # Permite que o container alcance o backend rodando no host (Linux).
    # No Docker Desktop (Windows/Mac) host.docker.internal já existe.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  ollama_models:
  mediamtx_recordings:
