services:
  redis:
    image: redis:7-alpine
    container_name: bullmq-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Usamos a variável de ambiente do arquivo .env aqui
    command: redis-server --save 60 1 --loglevel warning --requirepass ${DATABASE_PASSWORD_API}

  # Servidor de mídia do Portal de Câmeras (CFTV). O backend (no host) orquestra
  # via http://localhost:9997 e o MediaMTX chama o backend via host.docker.internal:3000.
  mediamtx:
    # Imagem própria = MediaMTX + tzdata (horário de Brasília no recordPath).
    build:
      context: ./mediamtx
      dockerfile: Dockerfile
    image: wip/mediamtx-tz:latest
    container_name: mediamtx
    restart: unless-stopped
    # network_mode: host dá acesso total à rede do servidor — necessário para que
    # o container consiga puxar streams RTSP de câmeras acessíveis pelo host.
    # Com host network, `ports:` é ignorado (as portas já ficam no host diretamente).
    network_mode: host
    environment:
      # IP público do servidor para os candidatos ICE do WebRTC (vem do .env).
      - MTX_WEBRTCADDITIONALHOSTS=${MEDIAMTX_WEBRTC_PUBLIC_IP}
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      # Grava direto numa pasta do projeto (bind mount) em vez de volume Docker,
      # para o backend ler facilmente em backend/storage/recordings.
      - ./storage/recordings:/recordings

volumes:
  redis_data:
