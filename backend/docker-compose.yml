services:
  redis:
    image: redis:7-alpine
    container_name: bullmq-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Usamos a variável de ambiente do arquivo .env aqui
    command: redis-server --save 60 1 --loglevel warning --requirepass ${DATABASE_PASSWORD_API}

volumes:
  redis_data:
