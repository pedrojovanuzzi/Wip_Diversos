###############################################
# MediaMTX — configuração para o portal de câmeras
# Roda em container separado. O backend Node orquestra via API (porta 9997).
# Docs: https://github.com/bluenviron/mediamtx
###############################################

# ---------- API de controle ----------
api: yes
apiAddress: :9997

# ---------- WebRTC (visualização ao vivo no navegador) ----------
webrtc: yes
webrtcAddress: :8889
# Porta UDP do ICE (a mídia do vídeo trafega por aqui). Precisa estar aberta no firewall.
webrtcLocalUDPAddress: :8189
# IP/host público do servidor — sem isso o navegador remoto não recebe um candidato ICE
# utilizável e o vídeo não conecta (o sinal até abre, mas a imagem não chega).
# IP público do servidor (mídia WebRTC vai direto neste IP, furando a Cloudflare).
# Definido por variável de ambiente MTX_WEBRTCADDITIONALHOSTS (vem do .env via compose),
# para não deixar o IP fixo no arquivo versionado.
# webrtcAdditionalHosts: []

# ---------- HLS (fallback opcional) ----------
hls: no

# ---------- RTSP (porta de ingestão; o pull é feito pelo MediaMTX) ----------
rtsp: yes
rtspAddress: :8554

# ---------- Playback server (reprodução de gravações) ----------
playback: yes
playbackAddress: :9996

# ---------- Gravação 24/7 com retenção de 3 dias ----------
# Na v1.x as opções de gravação ficam em pathDefaults (aplicadas a todos os paths).
pathDefaults:
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 1h
  recordDeleteAfter: 72h

# ---------- Autenticação externa via HTTP (delegada ao backend) ----------
# O MediaMTX consulta o backend para autorizar leitura/playback.
# O backend valida o token curto emitido por /cameras/:id/stream.
authMethod: http
# Backend roda no host (npm start), então o container o alcança via host.docker.internal.
# Se você containerizar o backend na mesma rede, troque por http://backend:3000/...
authHTTPAddress: http://localhost:3000/api/cameras/mediamtx-auth
# Ações que exigem checagem externa. A publicação/pull interno é liberada.
authHTTPExclude:
  - action: publish
  - action: api
  - action: metrics
  - action: pprof

# ---------- Paths ----------
# Os paths das câmeras são criados dinamicamente pelo backend via API.
# Nenhum path estático é necessário aqui.
paths: {}
