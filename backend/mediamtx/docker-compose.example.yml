# Exemplo de serviço MediaMTX para o portal de câmeras.
# Suba junto com o backend (mesma rede Docker) para que o backend alcance
# http://mediamtx:9997 e o MediaMTX alcance http://backend:3000.
#
#   docker compose -f docker-compose.example.yml up -d
#
services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "8889:8889" # WebRTC / WHEP (exponha atrás de HTTPS em produção)
      - "9996:9996" # Playback de gravações
      - "9997:9997" # API (mantenha interna; não exponha publicamente)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings
    # Conecte na mesma rede do backend para resolver "backend" e "mediamtx" por nome.
    # networks:
    #   - app

volumes:
  recordings:

