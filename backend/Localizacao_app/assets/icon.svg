<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <g filter="url(#shadow)" transform="translate(512 540)">
    <path d="M 0 -260
             C 145 -260 250 -155 250 -10
             C 250 140 50 320 0 380
             C -50 320 -250 140 -250 -10
             C -250 -155 -145 -260 0 -260 Z"
          fill="url(#pin)"/>
    <circle cx="0" cy="-20" r="85" fill="#2563eb"/>
    <circle cx="0" cy="-20" r="55" fill="#ffffff"/>
  </g>
</svg>
